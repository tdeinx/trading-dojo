<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Platforms & Tools · The Trading Dojo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;--gold-light:#F0CC7A;--gold-dim:#7A5E24;
  --ink:#0A0A0F;--ink-3:#1A1A24;--ink-4:#22222E;
  --panel:#13131C;--panel-2:#0F0F18;
  --border:rgba(201,168,76,0.15);--border-b:rgba(201,168,76,0.5);
  --text:#E8E0CC;--text-dim:#8A8070;--text-faint:#3A3630;
  --teal:#4CC9A8;--red:#C94C4C;--purple:#8B6FD4;--blue:#4C8BC9;--amber:#C9904C;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Rajdhani',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.92);backdrop-filter:blur(14px);position:sticky;top:0;z-index:200;}
.logo{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold);display:flex;align-items:center;gap:9px;cursor:pointer;}
.logo-mark{width:28px;height:28px;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:0.85rem;position:relative;flex-shrink:0;}
.logo-mark::before{content:'';position:absolute;inset:3px;border:1px solid rgba(201,168,76,0.22);}
.topbar-center{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.25em;color:var(--gold-dim);text-transform:uppercase;}
.xp-chip{background:var(--panel);border:1px solid var(--border);padding:6px 14px;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.12em;color:var(--gold);clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}

/* LAYOUT */
.body-layout{display:flex;flex:1;min-height:0;}

/* SIDEBAR */
.sidebar{width:268px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel-2);display:flex;flex-direction:column;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sb-header{padding:22px 20px 16px;border-bottom:1px solid var(--border);}
.sb-title{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.25em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:3px;}
.sb-sub{font-size:0.85rem;color:var(--text-dim);font-weight:300;}
.sb-progress{margin-top:14px;}
.sp-row{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.1em;color:var(--text-faint);margin-bottom:5px;}
.sp-row span{color:var(--gold);}
.sp-track{height:3px;background:var(--ink-4);border-radius:2px;overflow:hidden;}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width 0.6s ease;}
.sb-section-label{padding:14px 18px 6px;font-family:'Cinzel',serif;font-size:0.56rem;letter-spacing:0.22em;color:var(--text-faint);text-transform:uppercase;}
.sb-nav{flex:1;}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 18px;cursor:pointer;transition:all 0.2s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(201,168,76,0.04);border-left-color:rgba(201,168,76,0.25);}
.nav-item.active{background:rgba(201,168,76,0.07);border-left-color:var(--gold);}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-info{flex:1;min-width:0;}
.nav-name{font-family:'Cinzel',serif;font-size:0.7rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-item.active .nav-name{color:var(--gold);}
.nav-meta{font-size:0.62rem;color:var(--text-dim);margin-top:1px;}
.nav-badge{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.52rem;flex-shrink:0;font-family:'Cinzel',serif;}
.nb-idle{background:var(--ink-4);color:var(--text-faint);}
.nb-active{background:var(--gold);color:var(--ink);font-weight:700;animation:pb 2s ease-in-out infinite;}
.nb-done{background:rgba(76,201,168,0.18);color:var(--teal);border:1px solid rgba(76,201,168,0.35);}
@keyframes pb{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)}50%{box-shadow:0 0 0 5px rgba(201,168,76,0)}}
.sb-footer{padding:14px 18px;border-top:1px solid var(--border);}
.sb-xp{font-family:'Cinzel',serif;font-size:0.63rem;letter-spacing:0.14em;color:var(--text-faint);}
.sb-xp span{color:var(--gold);font-size:0.82rem;}

/* CONTENT */
.content-area{flex:1;overflow-y:auto;}
.page{display:none;animation:fu 0.38s ease forwards;}
.page.active{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* MODULE HERO */
.mod-hero{padding:44px 52px 36px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.mod-hero::after{content:'';position:absolute;top:0;right:0;width:320px;height:100%;background:radial-gradient(ellipse at right,var(--page-glow,rgba(201,168,76,0.05)) 0%,transparent 70%);pointer-events:none;}
.hero-eyebrow{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.3em;color:var(--text-faint);text-transform:uppercase;margin-bottom:14px;}
.hero-emoji{font-size:3rem;line-height:1;display:block;margin-bottom:14px;filter:drop-shadow(0 0 18px var(--page-color-dim,rgba(201,168,76,0.3)));}
.hero-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.7rem,3vw,2.5rem);font-weight:900;color:var(--page-color,var(--gold));line-height:1.1;margin-bottom:6px;}
.hero-sub{font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:0.18em;color:var(--text-dim);margin-bottom:16px;}
.hero-desc{font-size:1.05rem;font-weight:300;color:var(--text-dim);line-height:1.68;max-width:580px;}
.hero-desc strong{color:var(--text);font-weight:500;}

/* PLATFORM CARD */
.platforms-grid{padding:40px 52px;display:flex;flex-direction:column;gap:32px;max-width:960px;}
.platform-card{background:var(--panel);border:1px solid var(--border);position:relative;overflow:hidden;transition:border-color 0.25s;}
.platform-card:hover{border-color:rgba(201,168,76,0.28);}
.platform-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--pc-color,var(--gold)),transparent);opacity:0.6;}
.pc-header{display:flex;align-items:flex-start;justify-content:space-between;padding:28px 32px 0;gap:20px;flex-wrap:wrap;}
.pc-left{display:flex;align-items:flex-start;gap:18px;}
.pc-icon{font-size:2.4rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 0 14px var(--pc-color-dim,rgba(201,168,76,0.25)));}
.pc-id{}
.pc-name{font-family:'Cinzel Decorative',serif;font-size:1.3rem;font-weight:700;color:var(--pc-color,var(--gold));margin-bottom:3px;}
.pc-type{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase;}
.pc-verdict{padding:8px 14px;background:rgba(201,168,76,0.07);border:1px solid var(--border);font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.1em;color:var(--gold-dim);clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);text-align:center;max-width:180px;line-height:1.4;}
.pc-verdict strong{color:var(--gold);display:block;font-size:0.68rem;margin-bottom:2px;}

/* Rating bars */
.pc-ratings{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--border);margin:20px 0 0;}
.pc-rating-cell{background:var(--panel);padding:14px 18px;}
.pcr-label{font-family:'Cinzel',serif;font-size:0.54rem;letter-spacing:0.15em;color:var(--text-faint);text-transform:uppercase;margin-bottom:5px;}
.pcr-val{font-family:'Cinzel',serif;font-size:0.78rem;font-weight:700;color:var(--text);margin-bottom:6px;}
.pcr-track{height:3px;background:var(--ink-4);border-radius:2px;overflow:hidden;}
.pcr-fill{height:100%;border-radius:2px;background:var(--pc-color,var(--gold));}

/* Tags row */
.pc-tags{display:flex;flex-wrap:wrap;gap:8px;padding:18px 32px 0;}
.pc-tag{padding:5px 12px;background:var(--ink-3);border:1px solid var(--border);font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.1em;color:var(--text-dim);clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);}
.pc-tag.best{border-color:rgba(201,168,76,0.3);color:var(--gold-dim);background:rgba(201,168,76,0.05);}

/* Body */
.pc-body{padding:24px 32px 28px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:600px){.pc-body{grid-template-columns:1fr;}}
.pc-section-title{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.18em;color:var(--text-faint);text-transform:uppercase;margin-bottom:10px;}
.pc-list{list-style:none;}
.pc-list li{padding:5px 0;font-size:0.88rem;color:var(--text-dim);border-bottom:1px solid rgba(201,168,76,0.04);display:flex;align-items:flex-start;gap:9px;line-height:1.4;}
.pc-list li:last-child{border-bottom:none;}
.pc-list li::before{font-size:0.42rem;flex-shrink:0;margin-top:5px;}
.list-pros li::before{content:'◆';color:var(--teal);}
.list-cons li::before{content:'◆';color:var(--red);}
.list-features li::before{content:'◆';color:var(--pc-color,var(--gold));}

/* Key feature highlight */
.pc-feature-hl{margin:0 32px 24px;background:rgba(201,168,76,0.04);border:1px solid var(--border);border-left:3px solid var(--pc-color,var(--gold));padding:16px 20px;display:flex;gap:14px;align-items:flex-start;}
.pf-icon{font-size:1.4rem;line-height:1;flex-shrink:0;}
.pf-content{}
.pf-label{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.15em;color:var(--pc-color,var(--gold));margin-bottom:4px;text-transform:uppercase;}
.pf-text{font-size:0.9rem;color:var(--text-dim);line-height:1.55;font-weight:300;}
.pf-text strong{color:var(--text);font-weight:500;}

/* SECTION DIVIDER */
.section-divider{padding:36px 52px 20px;display:flex;align-items:center;gap:14px;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.sd-label{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.25em;color:var(--gold-dim);white-space:nowrap;text-transform:uppercase;}

/* DECISION GUIDE */
.decision-guide{padding:0 52px 52px;max-width:960px;}
.dg-intro{font-size:1rem;color:var(--text-dim);line-height:1.7;font-weight:300;margin-bottom:32px;}
.dg-intro strong{color:var(--text);font-weight:500;}
.stack-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.stack-card{background:var(--panel);border:1px solid var(--border);padding:22px;position:relative;transition:border-color 0.2s;}
.stack-card:hover{border-color:rgba(201,168,76,0.3);}
.stack-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc-color,var(--gold));opacity:0.5;}
.sc-archetype{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.12em;color:var(--sc-color,var(--gold));margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.sc-title{font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:12px;}
.sc-stack{display:flex;flex-direction:column;gap:5px;}
.sc-tool{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-dim);}
.sc-tool-dot{width:5px;height:5px;border-radius:50%;background:var(--sc-color,var(--gold));flex-shrink:0;}

/* QUIZ */
.quiz-wrap{background:var(--panel-2);border-top:1px solid var(--border);padding:48px 52px;}
.qz-title{font-family:'Cinzel Decorative',serif;font-size:1.45rem;font-weight:700;color:var(--gold);margin-bottom:6px;}
.qz-sub{font-size:0.93rem;color:var(--text-dim);font-weight:300;margin-bottom:36px;}
.qz-block{margin-bottom:26px;}
.qz-num{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.2em;color:var(--text-faint);text-transform:uppercase;margin-bottom:8px;}
.qz-q{font-size:1.04rem;font-weight:500;color:var(--text);line-height:1.55;margin-bottom:14px;}
.qz-q em{color:var(--gold);font-style:normal;font-weight:600;}
.qz-opts{display:flex;flex-direction:column;gap:8px;}
.qz-opt{background:var(--panel);border:1px solid var(--border);padding:13px 18px;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:12px;transition:all 0.17s;width:100%;}
.qz-opt:hover{border-color:rgba(201,168,76,0.38);background:var(--ink-3);transform:translateX(3px);}
.qz-opt.sel{border-color:var(--gold);background:rgba(201,168,76,0.07);}
.qz-opt.ok{border-color:var(--teal)!important;background:rgba(76,201,168,0.07)!important;}
.qz-opt.no{border-color:var(--red)!important;background:rgba(201,76,76,0.07)!important;}
.qz-opt:disabled{cursor:default;transform:none!important;}
.qz-dot{width:22px;height:22px;border:1px solid var(--border-b);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.54rem;font-family:'Cinzel',serif;transition:all 0.17s;margin-top:1px;}
.qz-opt.sel .qz-dot{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.qz-opt.ok .qz-dot{background:var(--teal);border-color:var(--teal);color:var(--ink);}
.qz-opt.no .qz-dot{background:var(--red);border-color:var(--red);color:#fff;}
.qz-opt-text{font-size:0.92rem;color:var(--text-dim);line-height:1.45;}
.qz-opt:hover .qz-opt-text,.qz-opt.sel .qz-opt-text{color:var(--text);}
.qz-fb{margin-top:9px;padding:11px 15px;font-size:0.87rem;line-height:1.5;display:none;}
.qz-fb.show{display:block;}
.qz-fb.ok{background:rgba(76,201,168,0.07);border:1px solid rgba(76,201,168,0.22);color:var(--teal);}
.qz-fb.no{background:rgba(201,76,76,0.07);border:1px solid rgba(201,76,76,0.22);color:#E87878;}
.qz-nav{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:8px;}
.btn-sub{font-family:'Cinzel',serif;font-size:0.73rem;font-weight:700;letter-spacing:0.18em;color:var(--ink);background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;padding:13px 34px;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all 0.24s;opacity:0.38;pointer-events:none;}
.btn-sub.rdy{opacity:1;pointer-events:all;}
.btn-sub.rdy:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(201,168,76,0.22);}
.btn-done{font-family:'Cinzel',serif;font-size:0.73rem;font-weight:700;letter-spacing:0.16em;color:var(--ink);background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;padding:13px 34px;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all 0.24s;display:none;}
.btn-done:hover{transform:translateY(-2px);}
.btn-ghost{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.13em;color:var(--gold);background:transparent;border:1px solid var(--border-b);padding:12px 26px;cursor:pointer;clip-path:polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%);transition:all 0.22s;}
.btn-ghost:hover{background:rgba(201,168,76,0.06);}
.score-box{display:none;background:var(--panel);border:1px solid var(--border);padding:26px 30px;margin-top:26px;text-align:center;animation:fu 0.38s ease;}
.score-box.show{display:block;}
.score-big{font-family:'Cinzel Decorative',serif;font-size:2.8rem;font-weight:900;color:var(--gold);line-height:1;}
.score-lbl{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.18em;color:var(--text-dim);margin-top:5px;}
.score-xp{display:inline-block;margin-top:12px;padding:7px 18px;background:rgba(201,168,76,0.09);border:1px solid var(--border-b);font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.14em;color:var(--gold);}
.score-msg{margin-top:14px;font-size:0.93rem;color:var(--text-dim);font-weight:300;line-height:1.5;}
.ornament{display:flex;align-items:center;gap:12px;margin:28px 0;}
.ornament::before,.ornament::after{content:'';flex:1;height:1px;background:var(--border);}
.ornament span{font-family:'Cinzel',serif;font-size:0.56rem;letter-spacing:0.2em;color:var(--text-faint);}

@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);}
  .body-layout{flex-direction:column;}
  .mod-hero,.platforms-grid,.decision-guide,.quiz-wrap,.section-divider{padding-left:22px;padding-right:22px;}
}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--ink);}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}
</style>

// SIDEBAR
// ═══════════════════════════════════════════
function buildSidebar(){
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '';

  // Brokers
  addSbSection(nav, 'Brokers & Apps');
  BROKERS.forEach(b=>{
    const el = makeNavItem(b.id, b.icon+' '+b.name, b.type.split('·')[0].trim(), b.color, 'broker-'+b.id);
    nav.appendChild(el);
  });

  // Tools
  addSbSection(nav, 'Charting & Research');
  TOOLS.forEach(t=>{
    const el = makeNavItem(t.id, t.icon+' '+t.name, t.type.split('·')[0].trim(), t.color, 'tool-'+t.id);
    nav.appendChild(el);
  });

  // Pages
  addSbSection(nav, 'Guides');
  const stackEl = makeNavItem('pickstack', '🎯 Build Your Stack', 'By Trader DNA', '#C9A84C', 'page-pickstack');
  nav.appendChild(stackEl);

  const quizEl = makeNavItem('quiz', '📝 Knowledge Quiz', '8 questions · 400 XP', '#4CC9A8', 'page-quiz');
  nav.appendChild(quizEl);

  markActive();
  updateProgress();
}

function addSbSection(nav, label){
  const d = document.createElement('div');
  d.className = 'sb-section-label';
  d.textContent = label;
  nav.appendChild(d);
}

function makeNavItem(id, name, meta, color, navId){
  const done = id === 'quiz' && state.quizScore !== null;
  const active = state.current === id;
  let badgeClass = 'nb-idle', badgeContent = '→';
  if(active){ badgeClass='nb-active'; badgeContent='▶'; }
  if(done){ badgeClass='nb-done'; badgeContent='✓'; }
  const el = document.createElement('div');
  el.className = 'nav-item' + (active?' active':'');
  el.id = 'nav-'+navId;
  el.onclick = () => selectPage(id);
  el.innerHTML = `
    <div class="nav-dot" style="background:${color}"></div>
    <div class="nav-info">
      <div class="nav-name">${name}</div>
      <div class="nav-meta">${meta}</div>
    </div>
    <div class="nav-badge ${badgeClass}">${badgeContent}</div>`;
  return el;
}

function markActive(){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const id = state.current;
  // find by data
  const all = document.querySelectorAll('.nav-item');
  all.forEach(n=>{
    if(n.onclick && n.onclick.toString().includes(`'${id}'`)) n.classList.add('active');
  });
}

function updateProgress(){
  const done = state.quizScore !== null ? 3 : 0;
  document.getElementById('sp-txt').textContent = (state.quizScore!==null?'3':'0') + ' / 3';
  document.getElementById('sp-fill').style.width = (state.quizScore!==null?100:0) + '%';
  document.getElementById('xp-disp').textContent = state.totalXP;
  document.getElementById('sb-xp').textContent = state.totalXP;
}

// ═══════════════════════════════════════════
// PAGE SELECTION
// ═══════════════════════════════════════════
function selectPage(id){
  state.current = id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  if(id === 'brokers') showBrokers();
  else if(id === 'tools') showToolsPage();
  else if(id === 'pickstack') showStackGuide();
  else if(id === 'quiz') showQuiz();
  else {
    // Individual broker or tool
    const broker = BROKERS.find(b=>b.id===id);
    const tool   = TOOLS.find(t=>t.id===id);
    if(broker) showBrokers(id);
    else if(tool) showToolsPage(id);
  }

  buildSidebar();
  document.getElementById('content-area').scrollTo({top:0,behavior:'smooth'});
}

function getOrCreate(id, tag='div'){
  let el = document.getElementById('page-'+id);
  if(el) return {el, fresh:false};
  el = document.createElement(tag);
  el.className = 'page';
  el.id = 'page-'+id;
  document.getElementById('content-area').appendChild(el);
  return {el, fresh:true};
}

      </div>
      <div class="quiz-wrap">
        <div class="qz-title">Platform Mastery Check</div>
        <div class="qz-sub">Answer all 8 questions · 50 XP each · 400 XP total</div>
        ${QUIZ.map((q,qi)=>`
          <div class="qz-block">
            <div class="qz-num">Question ${qi+1}</div>
            <div class="qz-q">${q.q}</div>
            <div class="qz-opts" id="qopts-${qi}">
              ${q.opts.map((o,oi)=>`
                <button class="qz-opt" id="qopt-${qi}-${oi}" onclick="pickQ(${qi},${oi})">
                  <div class="qz-dot">${String.fromCharCode(65+oi)}</div>
                  <div class="qz-opt-text">${o}</div>
                </button>`).join('')}
            </div>
            <div class="qz-fb" id="qfb-${qi}"></div>
          </div>`).join('')}
        <div class="ornament"><span>◆</span></div>
        <div class="qz-nav">
          <button class="btn-sub" id="btn-qsub" onclick="submitAllQuiz()">Submit Answers</button>
          <button class="btn-done" id="btn-qdone" onclick="selectPage('brokers')">Review Module ↺</button>
          <button class="btn-ghost" onclick="document.getElementById('content-area').scrollTo({top:0,behavior:'smooth'})">↑ Top</button>
        </div>
        <div class="score-box" id="qscore">
          <div class="score-big" id="qscore-big">0/8</div>
          <div class="score-lbl">Questions Correct</div>
          <div class="score-xp" id="qscore-xp">+0 XP</div>
          <div class="score-msg" id="qscore-msg"></div>
        </div>
      </div>`;

    // Restore
    Object.entries(state.quizAnswers).forEach(([qi,oi])=>{
      document.getElementById(`qopt-${qi}-${oi}`)?.classList.add('sel');
    });
    if(state.quizSubmitted) setTimeout(()=>renderQuizResults(), 50);
    checkQuizReady();
  }
  el.classList.add('active');

function pickQ(qi, oi){
  if(state.quizSubmitted) return;
  QUIZ[qi].opts.forEach((_,o)=>document.getElementById(`qopt-${qi}-${o}`)?.classList.remove('sel'));
  document.getElementById(`qopt-${qi}-${oi}`)?.classList.add('sel');
  state.quizAnswers[qi] = oi;
  saveState();
  checkQuizReady();
}

function checkQuizReady(){
  const all = QUIZ.every((_,qi)=>state.quizAnswers[qi]!==undefined);
  document.getElementById('btn-qsub')?.classList.toggle('rdy', all);
}

function submitAllQuiz(){
  const all = QUIZ.every((_,qi)=>state.quizAnswers[qi]!==undefined);
  if(!all) return;
  state.quizSubmitted = true;
  renderQuizResults();
  let correct = 0;
  QUIZ.forEach((q,qi)=>{ if(state.quizAnswers[qi]===q.correct) correct++; });
  const xp = correct*50;
  state.quizScore = correct;
  state.totalXP = xp;
  saveState();
  const msgs=['Keep reviewing the platforms — revisit the module.','Good effort — you are building platform knowledge.','Solid understanding of the trading tool landscape.','Strong — you know your platforms well.','Excellent platform knowledge!','Excellent!','Outstanding!','Outstanding platform mastery!','Perfect score — Platform Master! 🏆'];
  document.getElementById('qscore-big').textContent = correct+'/8';
  document.getElementById('qscore-xp').textContent = '+'+xp+' XP Earned';
  document.getElementById('qscore-msg').textContent = msgs[correct]||msgs[4];
  document.getElementById('qscore').classList.add('show');
  document.getElementById('btn-qsub').style.display='none';
  document.getElementById('btn-qdone').style.display='inline-block';
  updateProgress();
  setTimeout(()=>document.getElementById('qscore')?.scrollIntoView({behavior:'smooth',block:'center'}),200);
}

function renderQuizResults(){
  QUIZ.forEach((q,qi)=>{
    q.opts.forEach((_,oi)=>{
      const btn = document.getElementById(`qopt-${qi}-${oi}`);
      if(!btn) return;
      btn.classList.remove('sel','ok','no');
      if(oi===q.correct) btn.classList.add('ok');
      else if(state.quizAnswers[qi]===oi) btn.classList.add('no');
      btn.disabled=true;
    });
    const fb = document.getElementById(`qfb-${qi}`);
    if(fb){
      const ok = state.quizAnswers[qi]===q.correct;
      fb.className='qz-fb show '+(ok?'ok':'no');
      fb.textContent=(ok?'✓ ':'✗ Correct: '+q.opts[q.correct]+'. ')+q.feedback;
    }
  });
  document.getElementById('btn-qsub').style.display='none';
  document.getElementById('btn-qdone').style.display='inline-block';
  if(state.quizScore!==null){
    const msgs=['Keep reviewing.','Good effort.','Solid understanding.','Strong knowledge.','Excellent!','Excellent!','Outstanding!','Outstanding!','Perfect score — Platform Master! 🏆'];
    document.getElementById('qscore-big').textContent=state.quizScore+'/8';
    document.getElementById('qscore-xp').textContent='+'+(state.quizScore*50)+' XP Earned';
    document.getElementById('qscore-msg').textContent=msgs[state.quizScore]||msgs[4];
    document.getElementById('qscore')?.classList.add('show');
  }
}
