<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trading Styles · The Trading Dojo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;--gold-light:#F0CC7A;--gold-dim:#7A5E24;
  --ink:#0A0A0F;--ink-2:#111118;--ink-3:#1A1A24;--ink-4:#22222E;
  --panel:#13131C;--panel-2:#0F0F18;
  --border:rgba(201,168,76,0.15);--border-bright:rgba(201,168,76,0.5);
  --text:#E8E0CC;--text-dim:#8A8070;--text-faint:#3A3630;
  --teal:#4CC9A8;--red:#C94C4C;--purple:#8B6FD4;--blue:#4C8BC9;--amber:#C9904C;--green:#4CAF50;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Rajdhani',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.55;}

.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.92);backdrop-filter:blur(14px);position:sticky;top:0;z-index:200;}
.logo{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold);display:flex;align-items:center;gap:9px;text-decoration:none;cursor:pointer;}
.logo-mark{width:28px;height:28px;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:0.85rem;position:relative;flex-shrink:0;}
.logo-mark::before{content:'';position:absolute;inset:3px;border:1px solid rgba(201,168,76,0.22);}
.topbar-center{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.25em;color:var(--gold-dim);text-transform:uppercase;}
.xp-chip{background:var(--panel);border:1px solid var(--border);padding:6px 14px;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.12em;color:var(--gold);clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}

/* ── LAYOUT ── */
.body-layout{display:flex;flex:1;min-height:0;}

/* ── SIDEBAR ── */
.sidebar{width:268px;flex-shrink:0;border-right:1px solid var(--border);background:var(--panel-2);display:flex;flex-direction:column;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sidebar-header{padding:22px 20px 16px;border-bottom:1px solid var(--border);}
.sidebar-title{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.25em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:3px;}
.sidebar-sub{font-size:0.85rem;color:var(--text-dim);font-weight:300;}
.sidebar-progress{margin-top:14px;}
.sp-label{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.1em;color:var(--text-faint);margin-bottom:5px;}
.sp-label span{color:var(--gold);}
.sp-track{height:3px;background:var(--ink-4);border-radius:2px;overflow:hidden;}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width 0.6s ease;}
.sidebar-nav{padding:10px 0;flex:1;}
.nav-item{display:flex;align-items:center;gap:11px;padding:12px 18px;cursor:pointer;transition:all 0.2s;border-left:3px solid transparent;position:relative;}
.nav-item:hover{background:rgba(201,168,76,0.04);border-left-color:rgba(201,168,76,0.25);}
.nav-item.active{background:rgba(201,168,76,0.07);border-left-color:var(--gold);}
.nav-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-info{flex:1;min-width:0;}
.nav-name{font-family:'Cinzel',serif;font-size:0.7rem;font-weight:700;color:var(--text);letter-spacing:0.04em;}
.nav-item.active .nav-name{color:var(--gold);}
.nav-meta{font-size:0.63rem;color:var(--text-dim);margin-top:2px;}
.nav-badge{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.54rem;flex-shrink:0;font-family:'Cinzel',serif;}
.nb-idle{background:var(--ink-4);color:var(--text-faint);}
.nb-active{background:var(--gold);color:var(--ink);font-weight:700;animation:pulse-b 2s ease-in-out infinite;}
.nb-done{background:rgba(76,201,168,0.18);color:var(--teal);border:1px solid rgba(76,201,168,0.35);}
@keyframes pulse-b{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)}50%{box-shadow:0 0 0 5px rgba(201,168,76,0)}}
.sidebar-footer{padding:14px 18px;border-top:1px solid var(--border);}
.total-xp{font-family:'Cinzel',serif;font-size:0.63rem;letter-spacing:0.14em;color:var(--text-faint);}
.total-xp span{color:var(--gold);font-size:0.82rem;}

/* ── CONTENT ── */
.content-area{flex:1;overflow-y:auto;}
.lesson{display:none;animation:fadeUp 0.38s ease forwards;}
.lesson.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── HERO ── */
.lesson-hero{padding:44px 52px 36px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.lesson-hero::after{content:'';position:absolute;top:0;right:0;width:300px;height:100%;background:radial-gradient(ellipse at right center, var(--style-color-glow,rgba(201,168,76,0.05)) 0%, transparent 70%);pointer-events:none;}
.hero-eyebrow{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.3em;color:var(--text-faint);text-transform:uppercase;margin-bottom:14px;}
.hero-badge-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.style-badge{padding:5px 14px;border:1px solid var(--style-color,var(--gold));font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.15em;color:var(--style-color,var(--gold));clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.style-badge.filled{background:var(--style-color,var(--gold));color:var(--ink);}
.hero-emoji{font-size:3.2rem;line-height:1;display:block;margin-bottom:14px;filter:drop-shadow(0 0 18px var(--style-color-glow,rgba(201,168,76,0.35)));}
.hero-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.7rem,3.2vw,2.6rem);font-weight:900;color:var(--style-color,var(--gold));line-height:1.1;margin-bottom:5px;}
.hero-sub{font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:0.18em;color:var(--text-dim);margin-bottom:18px;}
.hero-tagline{font-size:1.08rem;font-weight:300;color:var(--text-dim);line-height:1.68;max-width:560px;}
.hero-tagline strong{color:var(--text);font-weight:500;}
.hero-quote{margin-top:20px;padding:14px 20px;border-left:2px solid var(--style-color,var(--gold));font-family:'Cinzel',serif;font-size:0.82rem;font-style:italic;color:var(--text-dim);letter-spacing:0.04em;}

/* ── COMBAT PROFILE ── */
.combat-profile{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);margin:36px 52px 0;}
.cp-cell{background:var(--panel);padding:18px 20px;}
.cp-label{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.18em;color:var(--text-faint);text-transform:uppercase;margin-bottom:6px;}
.cp-value{font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:8px;}
.cp-meter{height:3px;background:var(--ink-4);border-radius:2px;overflow:hidden;}
.cp-fill{height:100%;border-radius:2px;background:var(--style-color,var(--gold));}

/* ── LESSON BODY ── */
.lesson-body{padding:44px 52px;max-width:940px;}
.section-label{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.28em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:12px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.section-block{margin-bottom:44px;}

/* Analogy */
.analogy-card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--style-color,var(--gold));padding:22px 26px;display:flex;gap:18px;align-items:flex-start;}
.analogy-icon{font-size:1.9rem;line-height:1;flex-shrink:0;margin-top:2px;}
.analogy-text{font-size:0.97rem;line-height:1.7;color:var(--text-dim);font-weight:300;}
.analogy-text strong{color:var(--text);font-weight:500;}

/* Day in the life timeline */
.timeline{display:flex;flex-direction:column;gap:0;position:relative;}
.timeline::before{content:'';position:absolute;left:17px;top:8px;bottom:8px;width:1px;background:linear-gradient(180deg,var(--style-color,var(--gold)),transparent);opacity:0.3;}
.tl-item{display:flex;gap:20px;align-items:flex-start;padding:16px 0;position:relative;}
.tl-dot{width:35px;height:35px;border-radius:50%;border:2px solid var(--style-color,var(--gold));background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;position:relative;z-index:1;}
.tl-dot.highlight{background:var(--style-color,var(--gold));}
.tl-content{}
.tl-time{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.15em;color:var(--style-color,var(--gold));margin-bottom:4px;}
.tl-title{font-family:'Cinzel',serif;font-size:0.85rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.tl-desc{font-size:0.92rem;line-height:1.6;color:var(--text-dim);font-weight:300;}
.tl-desc strong{color:var(--text);font-weight:500;}

/* Pro/Con grid */
.procon-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:580px){.procon-grid{grid-template-columns:1fr;}}
.procon-card{background:var(--panel);border:1px solid var(--border);padding:22px 24px;position:relative;}
.procon-card::before{position:absolute;top:-9px;left:14px;background:var(--panel);padding:0 8px;font-family:'Cinzel',serif;font-size:0.56rem;letter-spacing:0.18em;}
.pc-pros::before{content:'STRENGTHS';color:var(--teal);}
.pc-cons::before{content:'CHALLENGES';color:var(--red);}
.procon-card ul{list-style:none;}
.procon-card ul li{padding:7px 0;font-size:0.9rem;color:var(--text-dim);border-bottom:1px solid rgba(201,168,76,0.05);display:flex;align-items:flex-start;gap:9px;line-height:1.45;}
.procon-card ul li:last-child{border-bottom:none;}
.procon-card ul li::before{font-size:0.5rem;flex-shrink:0;margin-top:5px;}
.pc-pros ul li::before{content:'◆';color:var(--teal);}
.pc-cons ul li::before{content:'◆';color:var(--red);}

/* Tools needed */
.tools-row{display:flex;flex-wrap:wrap;gap:10px;}
.tool-chip{padding:9px 16px;background:var(--panel);border:1px solid var(--border);font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.1em;color:var(--text-dim);transition:all 0.2s;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.tool-chip:hover{border-color:rgba(201,168,76,0.35);color:var(--gold);}

/* Who it is for */
.who-card{background:var(--panel);border:1px solid var(--border);padding:24px 28px;display:flex;gap:16px;align-items:flex-start;}
.who-icon{font-size:2rem;line-height:1;flex-shrink:0;}
.who-text{font-size:0.95rem;line-height:1.7;color:var(--text-dim);font-weight:300;}
.who-text strong{color:var(--style-color,var(--gold));font-weight:600;}

/* ── COMPARISON TABLE ── */
.compare-section{padding:0 52px 48px;max-width:940px;}
.compare-table{width:100%;border-collapse:collapse;}
.compare-table th{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.15em;color:var(--gold-dim);text-transform:uppercase;padding:10px 14px;border-bottom:2px solid var(--border);text-align:left;}
.compare-table td{padding:13px 14px;border-bottom:1px solid rgba(201,168,76,0.06);font-size:0.87rem;color:var(--text-dim);vertical-align:top;}
.compare-table tr:hover td{background:rgba(201,168,76,0.03);}
.ct-style{font-family:'Cinzel',serif;font-size:0.75rem;font-weight:700;color:var(--text);}
.ct-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0;}

/* ── QUIZ ── */
.quiz-section{background:var(--panel-2);border-top:1px solid var(--border);padding:48px 52px;}
.quiz-title{font-family:'Cinzel Decorative',serif;font-size:1.45rem;font-weight:700;color:var(--gold);margin-bottom:6px;}
.quiz-subtitle{font-size:0.93rem;color:var(--text-dim);font-weight:300;margin-bottom:36px;}
.quiz-q-block{margin-bottom:26px;}
.qq-num{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.2em;color:var(--text-faint);text-transform:uppercase;margin-bottom:8px;}
.qq-text{font-size:1.04rem;font-weight:500;color:var(--text);line-height:1.55;margin-bottom:14px;}
.qq-text em{color:var(--gold);font-style:normal;font-weight:600;}
.qq-opts{display:flex;flex-direction:column;gap:8px;}
.qq-opt{background:var(--panel);border:1px solid var(--border);padding:13px 18px;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:12px;transition:all 0.17s;width:100%;}
.qq-opt:hover{border-color:rgba(201,168,76,0.38);background:var(--ink-3);transform:translateX(3px);}
.qq-opt.selected{border-color:var(--gold);background:rgba(201,168,76,0.07);}
.qq-opt.correct{border-color:var(--teal)!important;background:rgba(76,201,168,0.07)!important;}
.qq-opt.wrong{border-color:var(--red)!important;background:rgba(201,76,76,0.07)!important;}
.qq-opt:disabled{cursor:default;transform:none!important;}
.opt-dot{width:22px;height:22px;border:1px solid var(--border-bright);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-family:'Cinzel',serif;transition:all 0.17s;margin-top:1px;}
.qq-opt.selected .opt-dot{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.qq-opt.correct .opt-dot{background:var(--teal);border-color:var(--teal);color:var(--ink);}
.qq-opt.wrong .opt-dot{background:var(--red);border-color:var(--red);color:#fff;}
.opt-text{font-size:0.92rem;color:var(--text-dim);line-height:1.45;}
.qq-opt:hover .opt-text,.qq-opt.selected .opt-text{color:var(--text);}
.qq-feedback{margin-top:9px;padding:11px 15px;font-size:0.87rem;line-height:1.5;display:none;border-radius:0;}
.qq-feedback.show{display:block;}
.qq-feedback.fb-ok{background:rgba(76,201,168,0.07);border:1px solid rgba(76,201,168,0.22);color:var(--teal);}
.qq-feedback.fb-no{background:rgba(201,76,76,0.07);border:1px solid rgba(201,76,76,0.22);color:#E87878;}
.quiz-nav-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:8px;}
.btn-submit{font-family:'Cinzel',serif;font-size:0.73rem;font-weight:700;letter-spacing:0.18em;color:var(--ink);background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;padding:13px 34px;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all 0.24s;opacity:0.38;pointer-events:none;}
.btn-submit.ready{opacity:1;pointer-events:all;}
.btn-submit.ready:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(201,168,76,0.22);}
.btn-next-mod{font-family:'Cinzel',serif;font-size:0.73rem;font-weight:700;letter-spacing:0.16em;color:var(--ink);background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;padding:13px 34px;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all 0.24s;display:none;}
.btn-next-mod:hover{transform:translateY(-2px);}
.btn-ghost{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.13em;color:var(--gold);background:transparent;border:1px solid var(--border-bright);padding:12px 26px;cursor:pointer;clip-path:polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%);transition:all 0.22s;}
.btn-ghost:hover{background:rgba(201,168,76,0.06);}
.score-reveal{display:none;background:var(--panel);border:1px solid var(--border);padding:26px 30px;margin-top:26px;text-align:center;animation:fadeUp 0.38s ease;}
.score-reveal.show{display:block;}
.score-big{font-family:'Cinzel Decorative',serif;font-size:2.8rem;font-weight:900;color:var(--gold);line-height:1;}
.score-label{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.18em;color:var(--text-dim);margin-top:5px;}
.score-xp{display:inline-block;margin-top:12px;padding:7px 18px;background:rgba(201,168,76,0.09);border:1px solid var(--border-bright);font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.14em;color:var(--gold);}
.score-msg{margin-top:14px;font-size:0.93rem;color:var(--text-dim);font-weight:300;line-height:1.5;}
.ornament{display:flex;align-items:center;gap:12px;margin:30px 0;color:var(--text-faint);}
.ornament::before,.ornament::after{content:'';flex:1;height:1px;background:var(--border);}
.ornament-sym{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.2em;white-space:nowrap;}

@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);}
  .body-layout{flex-direction:column;}
  .lesson-hero,.lesson-body,.quiz-section,.compare-section{padding-left:22px;padding-right:22px;}
  .combat-profile{margin-left:22px;margin-right:22px;}
}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--ink);}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo" onclick="alert('Back to Dashboard')"><div class="logo-mark">⚔</div>The Trading Dojo</div>
    <div class="topbar-center">Module II · Trading Styles</div>
    <div class="topbar-right">
      <div class="xp-chip">⚡ <span id="xp-display">0</span> XP</div>
    </div>
  </div>

  <div class="body-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Module II</div>
        <div class="sidebar-sub">Trading Styles</div>
        <div class="sidebar-progress">
          <div class="sp-label">Progress <span id="sp-text">0 / 6</span></div>
          <div class="sp-track"><div class="sp-fill" id="sp-fill" style="width:0%"></div></div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="total-xp">Module XP: <span id="sidebar-xp">0</span></div>
      </div>
    </aside>

    <!-- CONTENT -->
    <div class="content-area" id="content-area"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════

    dayInLife:[
      {time:'Pre-Market 8:00 AM',icon:'📰',title:'Morning Prep',desc:'Review overnight news, check earnings, scan for <strong>gappers</strong> (stocks up or down 5%+), and identify your top 2–3 watchlist candidates for the day. No prep = no trade.',highlight:false},

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let state = {
  current: 0,
  completed: {},
  totalXP: 0,
  answers: {},
  submitted: {},
};

function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem('dojo_styles')||'{}');
    if(s.completed) state.completed = s.completed;
    if(s.totalXP)   state.totalXP   = s.totalXP;
    if(s.answers)   state.answers   = s.answers;
    if(s.submitted) state.submitted = s.submitted;
  }catch(e){}
}
function saveState(){
  try{ localStorage.setItem('dojo_styles', JSON.stringify({
    completed:state.completed, totalXP:state.totalXP,
    answers:state.answers, submitted:state.submitted,
  }));}catch(e){}
}

// ══════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════
function buildSidebar(){
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = STYLES.map((s,i)=>{
    const done  = state.completed[i] !== undefined;
    const active = i === state.current;
    let badgeClass = 'nb-idle', badgeContent = (i+1)+'';
    if(active && !done){ badgeClass='nb-active'; badgeContent='▶'; }
    if(done){ badgeClass='nb-done'; badgeContent='✓'; }
    const meta = done ? `${state.completed[i]}/5 correct` : active ? 'In progress' : 'Not started';
    return `<div class="nav-item${active?' active':''}${done?' completed':''}" onclick="selectStyle(${i})" id="nav-${i}">
      <div class="nav-color-dot" style="background:${s.color}"></div>
      <div class="nav-info">
        <div class="nav-name">${s.emoji} ${s.name}</div>
        <div class="nav-meta">${meta}</div>
      </div>
      <div class="nav-badge ${badgeClass}">${badgeContent}</div>
    </div>`;
  }).join('') +
  `<div class="nav-item" onclick="selectComparison()" id="nav-compare" style="opacity:0.7;">
    <div class="nav-color-dot" style="background:var(--text-faint)"></div>
    <div class="nav-info"><div class="nav-name">📋 Style Comparison</div><div class="nav-meta">Side-by-side guide</div></div>
    <div class="nav-badge nb-idle">→</div>
  </div>`;
  updateProgress();
}

function updateProgress(){
  const done = Object.keys(state.completed).length;
  document.getElementById('sp-text').textContent = done + ' / 6';
  document.getElementById('sp-fill').style.width = (done/6*100) + '%';
  document.getElementById('xp-display').textContent = state.totalXP;
  document.getElementById('sidebar-xp').textContent  = state.totalXP;
}

// ══════════════════════════════════════

    <!-- BODY -->

      <!-- ANALOGY -->

          <div class="who-text">${s.whoFor}</div>
        </div>
      </div>

    </div><!-- end lesson-body -->

    <!-- QUIZ -->
    <div class="quiz-section">
      <div class="quiz-title">Knowledge Check</div>
      <div class="quiz-subtitle">5 questions · Answer all to submit · Earn up to 250 XP</div>

      ${s.quiz.map((q,qi)=>`
        <div class="quiz-q-block">
          <div class="qq-num">Question ${qi+1}</div>

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function selectStyle(idx){
  state.current = idx;
  document.querySelectorAll('.lesson').forEach(l=>l.classList.remove('active'));
  buildLesson(idx);
  document.getElementById('lesson-'+idx).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+idx)?.classList.add('active');
  document.getElementById('content-area').scrollTo({top:0,behavior:'smooth'});
}

function selectComparison(){
  document.querySelectorAll('.lesson').forEach(l=>l.classList.remove('active'));
  buildComparison();
  document.getElementById('lesson-compare').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-compare')?.classList.add('active');
  document.getElementById('content-area').scrollTo({top:0,behavior:'smooth'});
}

function goNext(idx){
  if(idx < STYLES.length-1) selectStyle(idx+1);
  else selectComparison();
}

function scrollTop(){
  document.getElementById('content-area').scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════
// QUIZ
// ══════════════════════════════════════
function pickOpt(li,qi,oi){
  if(state.submitted[li]) return;
  STYLES[li].quiz[qi].opts.forEach((_,o)=>document.getElementById(`opt-${li}-${qi}-${o}`)?.classList.remove('selected'));
  document.getElementById(`opt-${li}-${qi}-${oi}`)?.classList.add('selected');
  if(!state.answers[li]) state.answers[li]={};
  state.answers[li][qi]=oi;
  saveState();
  checkReady(li);
}

function checkReady(li){
  if(state.submitted[li]) return;
  const ans = state.answers[li]||{};
  const all = STYLES[li].quiz.every((_,qi)=>ans[qi]!==undefined);
  document.getElementById('btn-sub-'+li)?.classList.toggle('ready', all);
}

function submitQuiz(li){
  const ans = state.answers[li]||{};
  const all = STYLES[li].quiz.every((_,qi)=>ans[qi]!==undefined);
  if(!all) return;
  state.submitted[li] = true;
  renderSubmitted(li);
  let correct = 0;
  STYLES[li].quiz.forEach((q,qi)=>{ if(ans[qi]===q.correct) correct++; });
  const xp = correct*50;
  state.completed[li] = correct;
  state.totalXP += xp;
  saveState();
  const msgs=['Keep studying — review the lesson and try again.','Good start! Review the questions you missed.','Solid work — real knowledge building here.','Strong performance — you understand this style well.','Perfect! You have mastered this trading style! 🏆'];
  document.getElementById('sbig-'+li).textContent = correct+'/5';
  document.getElementById('sxp-'+li).textContent = '+'+xp+' XP Earned';
  document.getElementById('smsg-'+li).textContent = msgs[correct]||msgs[2];
  document.getElementById('score-'+li).classList.add('show');
  document.getElementById('btn-sub-'+li).style.display='none';
  document.getElementById('btn-next-'+li).style.display='inline-block';
  buildSidebar();
  setTimeout(()=>document.getElementById('score-'+li)?.scrollIntoView({behavior:'smooth',block:'center'}),200);
}

function renderSubmitted(li){
  const ans = state.answers[li]||{};
  STYLES[li].quiz.forEach((q,qi)=>{
    q.opts.forEach((_,oi)=>{
      const btn = document.getElementById(`opt-${li}-${qi}-${oi}`);
      if(!btn) return;
      btn.classList.remove('selected','correct','wrong');
      if(oi===q.correct) btn.classList.add('correct');
      else if(ans[qi]===oi) btn.classList.add('wrong');
      btn.disabled=true;
    });
    const fb = document.getElementById(`fb-${li}-${qi}`);
    if(fb){
      const ok = ans[qi]===q.correct;
      fb.className = 'qq-feedback show '+(ok?'fb-ok':'fb-no');
      fb.textContent = (ok?'✓ ':'✗ Correct: '+q.opts[q.correct]+'. ')+q.feedback;
    }
  });
  document.getElementById('btn-sub-'+li).style.display='none';
  document.getElementById('btn-next-'+li).style.display='inline-block';
  if(state.completed[li]!==undefined){
    const c=state.completed[li];
    const msgs=['Keep studying — review the lesson and try again.','Good start! Review the questions you missed.','Solid work — real knowledge building here.','Strong performance — you understand this style well.','Perfect! You have mastered this trading style! 🏆'];
    document.getElementById('sbig-'+li).textContent=c+'/5';
    document.getElementById('sxp-'+li).textContent='+'+(c*50)+' XP Earned';
    document.getElementById('smsg-'+li).textContent=msgs[c]||msgs[2];
    document.getElementById('score-'+li)?.classList.add('show');
  }
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
loadState();
buildSidebar();
buildLesson(state.current);
document.getElementById('lesson-'+state.current).classList.add('active');
updateProgress();
</script>
